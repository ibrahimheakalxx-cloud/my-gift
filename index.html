<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>هدية خاصة</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
        #login-screen { text-align: center; color: white; }
        #login-screen input { padding: 10px; margin: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; }
        #login-screen button { padding: 10px 20px; border-radius: 5px; border: none; background-color: #e91e63; color: white; font-size: 16px; cursor: pointer; font-weight: bold; }
        #gift-screen { display: none; }
        .cube-container { perspective: 800px; }
        .cube { width: 200px; height: 200px; position: relative; transform-style: preserve-3d; animation: rotate 10s infinite linear; }
        .face { position: absolute; width: 200px; height: 200px; border: 2px solid #fff; background-size: cover; background-position: center; }
    .front { transform: translateZ(100px); background-image: url('1.jpeg'); }
    .back { transform: rotateY(180deg) translateZ(100px); background-image: url('2.jpeg'); }
    .right { transform: rotateY(90deg) translateZ(100px); background-image: url('3.jpeg'); }
    .left { transform: rotateY(-90deg) translateZ(100px); background-image: url('4.jpeg'); }
        @keyframes rotate { from { transform: rotateY(0deg) rotateX(10deg); } to { transform: rotateY(360deg) rotateX(10deg); } }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2>أدخل الباسورد عشان تشوف الهدية 🎁</h2>
        <input type="password" id="password-input" placeholder="اكتب الباسورد هنا">
        <br>
        <button onclick="checkPassword()">دخول</button>
        <p id="error-message" style="color: #ff4d4d; display: none;">الباسورد غلط، حاول تاني!</p>
    </div>
    <div id="gift-screen" class="cube-container">
        <div class="cube">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face right"></div>
            <div class="face left"></div>
        </div>
    </div>
    <script>
        function checkPassword() {
            var pass = document.getElementById('password-input').value;
            if (pass === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('gift-screen').style.display = 'block';
            } else {
                document.getElementById('error-message').style.display = 'block';
            }
        }
    </script>
</body>
</html>
